<!-- PAGE TITLE -->

  <h1>Contact Me</h1>
  <p>Let’s work together</p>

<!-- CONTACT SECTION -->
<section class="contact-wrap">

  <!-- CONTACT INFO -->
  <div class="contact-info">

    <div class="contact-card">
      <h3>Email</h3>
      <p>danierulazy@gmail.com</p>
    </div>

    <div class="contact-card">
      <h3>Instagram</h3>
      <p>@danil02bbby_</p>
    </div>

    <div class="contact-card">
      <h3>WhatsApp</h3>
      <p>08*********08</p>
    </div>

  </div>

  <!-- CONTACT FORM (GMAIL) -->
  <form class="contact-form"
        action="mailto:danierulazy@gmail.com"
        method="POST"
        enctype="text/plain">

    <h3>Send Message</h3>

    <input type="text"
           name="Name"
           placeholder="Your Name"
           required>

    <input type="email"
           name="Email"
           placeholder="Your Email"
           required>

    <textarea name="Message"
              placeholder="Your Message"
              required></textarea>

    <button type="button" onclick="sendGmail()">Send via Gmail</button>

    <p class="form-note">
      *Message will be sent using Gmail
    </p>

  </form>

</section>

<script>
function sendGmail() {
  const name = document.querySelector('input[name="Name"]').value;
  const email = document.querySelector('input[name="Email"]').value;
  const message = document.querySelector('textarea[name="Message"]').value;

  const gmailURL =
    `https://mail.google.com/mail/?view=cm&fs=1` +
    `&to=danierulazy@gmail.com` +
    `&su=Message from ${encodeURIComponent(name)}` +
    `&body=Email: ${encodeURIComponent(email)}%0D%0A%0D%0A${encodeURIComponent(message)}`;

  window.open(gmailURL, '_blank');
}
</script>
